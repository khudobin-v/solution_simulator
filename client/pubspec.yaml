name: dissolution_simulator
description: "Cellular automaton dissolution simulator — Flutter client"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  http: ^1.4.0
  fl_chart: ^0.70.2
  google_fonts: ^6.2.1
  image: ^4.2.0
  file_picker: ^8.1.7
  pdf: ^3.11.0
  printing: ^5.13.1
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  macos:
    generate: true
    image_path: "assets/icon.png"

flutter:
  uses-material-design: true
